<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4efe6" />
    <title>SlyOS offline</title>
    <style>
      :root {
        color: #1a1714;
        background: #f4efe6;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, system-ui, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      main {
        max-width: 360px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: #5c544b;
        font-size: 18px;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SlyOS is offline.</h1>
      <p>The app shell is cached, but this route needs the local bundle. Reconnect once, then SlyOS will keep the brain surface ready.</p>
    </main>
  </body>
</html>
